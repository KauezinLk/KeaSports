services:
  - type: web
    name: keasports
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: python manage.py migrate --noinput && gunicorn keasports.wsgi:application --bind 0.0.0.0:$PORT --workers ${WEB_CONCURRENCY:-2} --threads ${GUNICORN_THREADS:-2} --timeout ${GUNICORN_TIMEOUT:-120} --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ADMIN_URL
        generateValue: true
      - key: DJANGO_MEDIA_STORAGE
        value: s3
      - key: AWS_STORAGE_BUCKET_NAME
        value: keasports
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SUPABASE_STORAGE_URL
        value: https://ucolinxrvgyfoadohsbc.supabase.co
      - key: AWS_S3_ENDPOINT_URL
        value: https://ucolinxrvgyfoadohsbc.storage.supabase.co/storage/v1/s3
      - key: AWS_S3_REGION_NAME
        sync: false
      - key: AWS_S3_ADDRESSING_STYLE
        value: path
      - key: AWS_S3_SIGNATURE_VERSION
        value: s3v4
      - key: AWS_LOCATION
        value: media
      - key: AWS_QUERYSTRING_AUTH
        value: "False"
      - key: AWS_S3_FILE_OVERWRITE
        value: "False"
      - key: DB_CONN_MAX_AGE
        value: "60"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_LOG_LEVEL
        value: INFO
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_THREADS
        value: "2"
