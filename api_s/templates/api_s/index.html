{% extends 'base.html' %} {% load static %} {% block title %}Home{% endblock %}
{% block content %}

<!-- HERO SECTION -->
<section class="bg-gray-50 py-8 md:py-12">
  <div class="max-w-7xl mx-auto px-4">
    <!-- Botão de Ação -->
    <div
      class="text-center mt-8 hero-button opacity-0 transform translate-y-4 transition-all duration-700 ease-out"
      style="transition-delay: 0.3s"
    >
      <a
        href="{% url 'listar_corridas' %}"
        class="inline-block bg-[#E30000] text-white font-bold text-lg px-10 py-4 rounded-full hover:bg-red-700 transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl"
      >
        Explorar Eventos
      </a>
    </div>
  </div>
</section>

<!-- Animação de entrada -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const heroImage = document.querySelector(".hero-image");
    const heroButton = document.querySelector(".hero-button");

    // Trigger animations after a small delay
    setTimeout(function () {
      if (heroImage) {
        heroImage.style.opacity = "1";
        heroImage.style.transform = "translateY(0)";
      }
      if (heroButton) {
        heroButton.style.opacity = "1";
        heroButton.style.transform = "translateY(0)";
      }
    }, 100);
  });
</script>

<!-- TÍTULO PRINCIPAL -->
<h1
  class="text-4xl md:text-5xl font-bold text-center my-10 text-cyan-800 tracking-wide"
>
  KEA SPORTS
</h1>

<!-- PRÓXIMAS CORRIDAS -->
<h2 class="text-gray-600 text-center text-xl md:text-2xl tracking-wide mb-6">
  Próximas corridas
</h2>

{% include 'api_s/corrida/home_corridas.html' %} {% endblock %}
