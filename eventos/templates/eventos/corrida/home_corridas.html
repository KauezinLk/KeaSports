{% if corridas %}

<div class="relative max-w-6xl mx-auto px-4 sm:px-0" data-carousel>
  <div class="flex items-center justify-end gap-2 mb-4">
    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-full bg-white text-gray-700 shadow-md transition hover:bg-gray-100 hover:text-[#E30000]"
      aria-label="Corrida anterior"
      data-carousel-prev
    >
      <span class="text-xl leading-none">&larr;</span>
    </button>
    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-full bg-white text-gray-700 shadow-md transition hover:bg-gray-100 hover:text-[#E30000]"
      aria-label="Proxima corrida"
      data-carousel-next
    >
      <span class="text-xl leading-none">&rarr;</span>
    </button>
  </div>

  <div
    class="overflow-x-auto scroll-smooth pb-2"
    style="scrollbar-width: none;"
    data-carousel-track
  >
    <div class="flex gap-4 sm:gap-6">
      {% for corrida in corridas %}
      <div
        class="min-w-[calc(100%-16px)] sm:min-w-[calc(50%-12px)] lg:min-w-[calc(33.33%-16px)] bg-white rounded-xl shadow-md hover:shadow-lg transition p-4 flex-shrink-0"
      >
        <div class="flex h-full flex-col">
          {% if corrida.imagem %}
          <img
            src="{{ corrida.imagem.url }}"
            alt="{{ corrida.nome }}"
            class="w-full h-44 object-cover rounded-lg mb-3 cursor-zoom-in transition hover:opacity-90"
            data-lightbox-image
            data-lightbox-src="{{ corrida.imagem.url }}"
            data-lightbox-alt="{{ corrida.nome }}"
            tabindex="0"
          />
          {% else %}
          <div
            class="w-full h-44 flex items-center justify-center bg-gray-100 rounded-lg mb-3 text-gray-400"
          >
            &mdash;
          </div>
          {% endif %}

          <h2 class="text-lg font-semibold text-gray-800 mb-3">
            {{ corrida.nome }}
          </h2>

          <div class="mb-4 flex-1">
            <p class="text-base text-gray-600 flex items-center gap-2 mb-2">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-5 h-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
                />
              </svg>
              {{ corrida.local }}
            </p>

            <p class="text-base text-gray-600 flex items-center gap-2">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-5 h-5 text-gray-400"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"
                />
              </svg>
              {{ corrida.data }}
            </p>
          </div>

          <a
            href="{% url 'inscrever_corrida' corrida.id %}"
            class="block w-full text-center bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold"
          >
            Inscrever-se
          </a>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <div class="mt-4 flex justify-center gap-2" data-carousel-indicators>
    {% for corrida in corridas %}
    <button
      type="button"
      class="h-2.5 w-2.5 rounded-full bg-gray-300 transition data-[active=true]:bg-[#E30000]"
      aria-label="Ir para corrida {{ forloop.counter }}"
      data-index="{{ forloop.counter0 }}"
      data-active="{% if forloop.first %}true{% else %}false{% endif %}"
    ></button>
    {% endfor %}
  </div>
</div>

{% else %}
<p class="text-gray-500 text-center">Nao ha corridas disponiveis.</p>
{% endif %}
