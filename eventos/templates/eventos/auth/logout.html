{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-md rounded-xl bg-white p-6 text-center shadow">
  <h2 class="mb-4 text-2xl font-bold text-gray-900">Tem certeza que deseja sair?</h2>

  <div class="flex flex-col gap-3 sm:flex-row sm:justify-center">
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit" class="rounded-lg bg-[#E30000] px-5 py-2 font-bold text-white hover:bg-red-700">
        Deslogar
      </button>
    </form>
    <a href="{% url 'index' %}" class="rounded-lg bg-gray-200 px-5 py-2 font-bold text-gray-700 hover:bg-gray-300">
      Cancelar
    </a>
  </div>
</div>
{% endblock %}
